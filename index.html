    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Animaciones globales */
        @keyframes flow {
            0% {
                left: 0%;
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                left: 100%;
                opacity: 0;
            }
        }

        .animate-flow {
            animation: flow 2s infinite linear;
        }

        @keyframes scan {

            0%,
            100% {
                top: 0%;
            }

            50% {
                top: 100%;
            }
        }

        .animate-scan {
            animation: scan 3s infinite ease-in-out;
        }

        @keyframes pulse-custom {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.7;
            }
        }

        .animate-pulse-custom {
            animation: pulse-custom 2s infinite;
        }

        @keyframes rotation {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-rotation {
            animation: rotation 10s infinite linear;
        }

        /* Estilos de profundidad */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

        const concepts = [
            {

            {
                title: "Firewall",

        function updatePage() {
            const concept = concepts[currentIndex];
            document.getElementById('concept-title').innerText = concept.title;
            document.getElementById('concept-definition').innerText = concept.definition;
            document.getElementById('concept-example').innerText = concept.example;
            document.getElementById('osi-layer').innerText = concept.layer || "N/A";
            document.getElementById('page-indicator').innerText = `HOJA ${currentIndex + 1} DE 20`;

            // Barra de progreso
            const progress = ((currentIndex + 1) / 20) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            // Icono
            document.getElementById('concept-icon').innerHTML = icons[concept.icon] || icons.globe;

            // Simulación Única
            renderSimulation(concept.type);

            // Botones
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('prevBtn').style.opacity = currentIndex === 0 ? '0.3' : '1';

            document.getElementById('nextBtn').disabled = currentIndex === concepts.length - 1;
            document.getElementById('nextBtn').style.opacity = currentIndex === concepts.length - 1 ? '0.3' : '1';
        }

        document.getElementById('nextBtn').addEventListener('click', () => {
            if (currentIndex < concepts.length - 1) {
                currentIndex++;
                updatePage();
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updatePage();
            }
        });

        // Inicio
        window.onload = updatePage;
    </script>
